<div id="search" role="search" class="sidebar">
  
  <h2 class="a11y">Search</h2>
  <form id="search-form" action="#search" method="post">
    <dl>
      <dt class="a11y">
        <label for="search-query">Query string</label>
      </dt>
      <dd>
        <input type="search" id="search-query" name="q" value="" />
        <button type="submit" id="search-submit">Search</button>
      </dd>
      <dt class="a11y">
        <h3>Filter</h3>
      </dt>
      <dd>
        <ul>
          <li>
            
            <a href="#filter-topic">
              <span class="label">Topic</span>
              <span class="value">All topics</span>
            </a>
            <div id="#filter-topic">
              <a href="#close">Close</a>
              <fieldset>
                <legend>Topic</legend>
                
                
                
              </fieldset>
            </div>
            
          <li>
        </ul>
      </dd>
    </dl>
  </form>
  
</div>
